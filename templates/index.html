<!DOCTYPE html>
<html>
<head>
    <title>YOLO Object Mask App</title>
</head>
<body>

<h2>Upload Image</h2>

<input type="file" id="file" accept="image/*"><br><br>

<h3>Detected Objects</h3>
<select id="dropdown">
    <option>Select object</option>
</select>

<br><br>

<h3>Mask Output</h3>
<img id="mask" width="400"/>

<script>
document.getElementById("file").onchange = function(e) {
    let uploadedFile = e.target.files[0];

    let formData = new FormData();
    formData.append("file", uploadedFile);

    fetch("/detect", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        let dropdown = document.getElementById("dropdown");
        dropdown.innerHTML = "";

        if (data.objects.length === 0) {
            let opt = document.createElement("option");
            opt.text = "No objects detected";
            dropdown.appendChild(opt);
            return;
        }

        let defaultOpt = document.createElement("option");
        defaultOpt.text = "Select object";
        defaultOpt.value = "";
        dropdown.appendChild(defaultOpt);

        data.objects.forEach(obj => {
            let opt = document.createElement("option");
            opt.value = obj.id;
            opt.text = obj.name + " - ID " + obj.id;
            dropdown.appendChild(opt);
        });
    })
    .catch(err => {
        alert("Detection failed");
        console.error(err);
    });
};

document.getElementById("dropdown").onchange = function(e) {
    if (!e.target.value) return;

    let fd = new FormData();
    fd.append("object_id", e.target.value);

    fetch("/mask", {
        method: "POST",
        body: fd
    })
    .then(res => res.blob())
    .then(img => {
        document.getElementById("mask").src = URL.createObjectURL(img);
    })
    .catch(err => {
        alert("Mask generation failed");
        console.error(err);
    });
};
</script>

</body>
</html>
